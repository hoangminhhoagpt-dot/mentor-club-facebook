name: dang-bai

# Gọi qua HTTP:  POST https://api.github.com/repos/<OWNER>/<REPO>/dispatches
#   body: {"event_type":"dang-bai","client_payload":{...}}
# Hoặc bấm tay: tab Actions → dang-bai → Run workflow.

on:
  repository_dispatch:
    types: [dang-bai]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Để trống = chạy thường | --update = ghi đè dữ liệu cũ | --dry-run = chạy thử'
        required: false
        default: ''
      record_id:
        description: 'record_id của 1 dòng cần đăng ngay (để trống = quét cả bảng theo lịch)'
        required: false
        default: ''

concurrency:
  group: dang-bai
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Đăng bài / Reel từ bảng 14.3 lên Facebook
        env:
          # Bí mật — Settings → Secrets and variables → Actions → Secrets
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          FB_USER_TOKEN:   ${{ secrets.FB_USER_TOKEN }}
          # Cấu hình — Settings → Secrets and variables → Actions → Variables
          LARK_APP_ID:     ${{ github.event.client_payload.lark_app_id || vars.LARK_APP_ID }}
          LARK_BASE_ID:    ${{ github.event.client_payload.base_id || vars.LARK_BASE_ID }}
          LARK_DOMAIN:     ${{ vars.LARK_DOMAIN }}
          TABLE_DANGBAI:   ${{ github.event.client_payload.table_dangbai || vars.TABLE_DANGBAI }}
          TABLE_PAGES:     ${{ github.event.client_payload.table_pages || vars.TABLE_PAGES }}
          RECORD_ID:       ${{ github.event.client_payload.record_id || github.event.inputs.record_id }}
          RESPECT_SCHEDULE: ${{ github.event.client_payload.respect_schedule }}
          REEL_CHUNK_MB:   ${{ github.event.client_payload.reel_chunk_mb }}
        run: node scripts/post-feed.js ${{ github.event.client_payload.mode || github.event.inputs.mode }}
