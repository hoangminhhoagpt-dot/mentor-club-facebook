name: fetch-posts

# Gọi qua HTTP:  POST https://api.github.com/repos/<OWNER>/<REPO>/dispatches
#   body: {"event_type":"fetch-posts","client_payload":{...}}
# Hoặc bấm tay: tab Actions → fetch-posts → Run workflow.

on:
  repository_dispatch:
    types: [fetch-posts]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Để trống = UPSERT (có thì cập nhật, chưa có thì tạo mới) | --skip-existing = chỉ thêm mới | --dry-run = chạy thử'
        required: false
        default: ''
      posts_per_page:
        description: 'Số bài lấy mỗi Page (0 = lấy hết)'
        required: false
        default: '50'

concurrency:
  group: fetch-posts
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lấy bài viết + tương tác về bảng 14.2
        env:
          # Bí mật — Settings → Secrets and variables → Actions → Secrets
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          FB_USER_TOKEN:   ${{ secrets.FB_USER_TOKEN }}
          # Cấu hình — Settings → Secrets and variables → Actions → Variables
          LARK_APP_ID:     ${{ github.event.client_payload.lark_app_id || vars.LARK_APP_ID }}
          LARK_BASE_ID:    ${{ github.event.client_payload.base_id || vars.LARK_BASE_ID }}
          LARK_DOMAIN:     ${{ vars.LARK_DOMAIN }}
          TABLE_POSTS:     ${{ github.event.client_payload.table_posts || vars.TABLE_POSTS }}
          TABLE_PAGES:     ${{ github.event.client_payload.table_pages || vars.TABLE_PAGES }}
          POSTS_PER_PAGE:  ${{ github.event.client_payload.posts_per_page || github.event.inputs.posts_per_page }}
          POSTS_THUMBNAIL: ${{ github.event.client_payload.posts_thumbnail }}
        run: node scripts/fetch-posts.js ${{ github.event.client_payload.mode || github.event.inputs.mode }}
